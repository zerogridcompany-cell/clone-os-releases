<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clone OS</title>
  <link rel="icon" href="./logo.png" />
  <style>
    @font-face {
      font-family: 'DM Sans';
      src: url('./dmsans-latin.woff2') format('woff2');
      font-weight: 100 1000;
      font-display: swap;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #ffffff; color: #1d1d1f;
      font-family: 'DM Sans', -apple-system, 'Hiragino Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .hero { display: flex; flex-direction: column; align-items: center; gap: 26px; padding: 24px; }
    .mark { display: flex; align-items: center; gap: 14px; }
    .mark img { width: 44px; height: 44px; }
    .mark span { font-size: 26px; font-weight: 650; letter-spacing: -0.02em; }
    a.dl {
      display: inline-block; padding: 16px 44px; border-radius: 999px;
      background: linear-gradient(180deg, #3a93ff 0%, #0071e3 100%);
      color: #fff; font-size: 17px; font-weight: 600; text-decoration: none;
      box-shadow: 0 1px 2px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.28);
      transition: filter .15s ease, transform .15s ease;
    }
    a.dl:hover { filter: brightness(1.05); transform: translateY(-1px); }
    a.dl:active { transform: translateY(0); }
    code.cmd {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12.5px; color: #6e6e73;
      background: #f5f5f7; border: 1px solid rgba(0,0,0,.08); border-radius: 999px;
      padding: 9px 18px; cursor: pointer; transition: color .15s ease, border-color .15s ease;
      max-width: 92vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    code.cmd:hover { color: #1d1d1f; border-color: rgba(0,0,0,.16); }
    code.cmd.ok { color: #1a7a45; border-color: rgba(48,180,107,.4); }
  </style>
</head>
<body>
  <main class="hero">
    <div class="mark"><img src="./logo.png" alt="" /><span>Clone OS</span></div>
    <a class="dl" href="#" id="dl">Download for Mac</a>
    <code class="cmd" id="cmd" title="クリックでコピー">curl -fsSL https://zerogridcompany-cell.github.io/clone-os-releases/install.sh | bash</code>
  </main>
  <script>
    const CMD = 'curl -fsSL https://zerogridcompany-cell.github.io/clone-os-releases/install.sh | bash';
    const cmd = document.getElementById('cmd');
    cmd.onclick = async () => {
      await navigator.clipboard.writeText(CMD);
      cmd.classList.add('ok');
      cmd.textContent = 'コピーしました — ターミナルに貼り付けてEnter';
      setTimeout(() => { cmd.classList.remove('ok'); cmd.textContent = CMD; }, 2200);
    };
    document.getElementById('dl').onclick = (e) => { e.preventDefault(); cmd.click(); };
  </script>
</body>
</html>
